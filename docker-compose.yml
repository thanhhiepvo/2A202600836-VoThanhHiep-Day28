# docker-compose.yml
name: lab28

services:
  # ── Kafka Stack ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Prefect ───────────────────────────────────────────────
  prefect-orion:
    image: prefecthq/prefect:2.14.0-python3.10
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect

  prefect-worker:
    image: prefecthq/prefect:2.14.0-python3.10
    command: >
      sh -c "prefect work-pool create --type process lab28-worker 2>/dev/null || true
      && prefect worker start -p lab28-worker -n lab28-worker"
    environment:
      PREFECT_API_URL: http://prefect-orion:4200/api
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DELTA_LAKE_PATH: /opt/delta-lake/raw
    volumes:
      - ./prefect/flows:/opt/prefect/flows
      - ./delta-lake:/opt/delta-lake
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [prefect-orion, kafka]

  # ── Vector Store (Qdrant) ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Feature Store (Feast via Redis) ──────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Monitoring Stack ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

  # ── API Gateway ───────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      VLLM_URL: ${VLLM_NGROK_URL:-}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-lab28-platform}
      MOCK_VLLM: ${MOCK_VLLM:-0}
    depends_on: [qdrant, redis]

volumes:
  prefect_data:
  qdrant_data:
